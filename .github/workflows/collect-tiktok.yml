name: Collect TikTok views

# Runs yt-dlp on a schedule to refresh view counts, then publishes a JSON
# snapshot to the `data` branch. The Vercel app reads that snapshot via
# TIKTOK_SNAPSHOT_URL, so it never has to scrape TikTok itself.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: collect-tiktok
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Collect views
        env:
          # Set this in repo Settings > Secrets and variables > Actions > Variables
          TIKTOK_VIDEO_URLS: ${{ vars.TIKTOK_VIDEO_URLS }}
          TIKTOK_OUT: tiktok-views.json
        run: node scripts/collect-tiktok.mjs

      - name: Publish snapshot to data branch
        run: |
          git config user.name "tiktok-bot"
          git config user.email "actions@github.com"
          mkdir -p /tmp/pub && cp tiktok-views.json /tmp/pub/
          # Drop the freshly-written (untracked) file so it can't block the
          # checkout of a `data` branch that already tracks tiktok-views.json.
          rm -f tiktok-views.json
          git fetch origin data || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            # Base the local branch on the remote tip so the push fast-forwards.
            git checkout -B data origin/data
          else
            # First ever run: start the branch with a clean tree.
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/pub/tiktok-views.json ./tiktok-views.json
          git add tiktok-views.json
          git commit -m "Update TikTok snapshot $(date -u +%FT%TZ)" || echo "no change"
          git push origin data
